---
layout: default
---

<article class="finder-pane finder-project-pane{% if page.gallery_mode == 'desktop-grid' %} finder-project-pane-has-gallery{% endif %}">
  <header class="finder-pane-header finder-project-header">
    <div class="finder-project-titleblock">
      <p class="finder-pane-eyebrow">{{ page.category }}</p>
      <h1>{{ page.title }}</h1>
      <p class="finder-pane-intro">{{ page.time }}</p>
    </div>

    {% if page.image %}
      <div class="finder-project-preview">
        <img src="{{ page.image }}" alt="{{ page.title }} preview image">
      </div>
    {% endif %}
  </header>

  <div class="finder-document{% if page.gallery_mode == 'desktop-grid' %} finder-document-has-gallery{% endif %}">
    {{ content }}
  </div>
</article>
